title: "[项目想法] "
labels: ["project-idea"]

body:
  - type: markdown
    attributes:
      value: |
        请认真填写下面的信息。

        这里提交的是“项目想法”， 可以是一个完整项目，也可以是一个具体问题的改进想法
        例如：修复 OJ 系统搜索框二次搜索失效问题。

  - type: input
    id: idea-name
    attributes:
      label: 想法名称
      description: 用简短的话写出你的项目或问题名称。
      placeholder: 例如：修复 OJ 系统搜索框二次搜索失效问题
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: 一句话概括
      description: 用一句话说明这个想法主要想做什么。
      placeholder: 例如：修复 OJ 系统中搜索框第一次搜索正常、第二次再次搜索时失效的问题，提升题目检索体验。
    validations:
      required: true

  - type: dropdown
    id: direction
    attributes:
      label: 项目方向
      description: 请选择这个想法大致属于哪一类。
      options:
        - ACM / XCPC 训练辅助
        - OJ / 题单 / 排名榜
        - 社团管理工具
        - 知识库 / 文档建设
        - 网站 / 前端 / 后端
        - Bug 修复 / 功能优化
        - 项目重构
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 请说明目前存在的问题，以及为什么值得解决。
      placeholder: |
        例如：

        目前 OJ 系统的搜索框在第一次输入关键词并搜索时可以正常返回结果，
        但当用户进入二级页面再次返回到该页面时，搜索功能会失效，可能表现为没有反应、结果不刷新，
        或者仍然停留在第一次搜索结果。

        这个问题会影响用户查找题目的效率，尤其是在训练时需要频繁搜索题号、题目名称、
        标签或关键词。如果不修复，用户可能需要刷新页面后才能再次搜索，使用体验较差。
    validations:
      required: true

  - type: textarea
    id: users
    attributes:
      label: 目标用户
      description: 这个想法主要面向哪些人？
      placeholder: 例如：主要面向使用 OJ 系统进行训练的社团成员、新生，以及负责维护题单的管理员。
    validations:
      required: true

  - type: textarea
    id: scene
    attributes:
      label: 使用场景
      description: 请举一个具体使用场景，说明这个问题会在什么情况下出现。
      placeholder: |
        例如：

        用户第一次在搜索框中输入“0940”进行搜索，系统可以正常返回动态规划相关题目。

        随后完成某一个单元后再次返回该页面再次搜索“0940”或者搜索任意内容均无反应，
        搜索结果没有更新，或者搜索按钮没有触发新的请求。
        用户只能刷新页面后重新输入关键词，操作不方便。
    validations:
      required: true

  - type: textarea
    id: mvp
    attributes:
      label: 最小可实现版本
      description: 如果暑假只做一个基础版本，你认为应该先完成哪些内容？
      placeholder: |
        例如：

        1. 复现搜索框二次搜索失效的问题。
        2. 定位问题出现在前端事件绑定、搜索状态更新、接口请求参数，还是后端查询逻辑。
        3. 修复搜索框再次输入关键词后无法重新搜索的问题。
        4. 保证连续多次搜索时结果能够正常刷新。
        5. 简单测试空关键词、不同关键词、重复关键词搜索等情况。
    validations:
      required: true

  - type: textarea
    id: extension
    attributes:
      label: 后续可扩展功能
      description: 基础版本完成后，还可以继续优化哪些内容？
      placeholder: |
        例如：

        1. 增加回车键搜索功能。
        2. 增加搜索结果为空时的提示。
        3. 增加搜索加载状态，例如“搜索中……”。
        4. 支持按题号、题目标题、标签、难度等条件组合搜索。
        5. 优化移动端搜索框显示效果。
    validations:
      required: false

  - type: dropdown
    id: difficulty
    attributes:
      label: 预估难度
      description: 你认为这个想法实现起来大概有多难？
      options:
        - 简单
        - 简单到中等
        - 中等
        - 中等到困难
        - 困难
        - 暂不确定
    validations:
      required: true

  - type: textarea
    id: workload
    attributes:
      label: 暑假工作量预估
      description: 大概需要多少时间完成一个基础版本？
      placeholder: |
        例如：

        预计 1—3 天可以完成基础修复。

        如果只是前端状态或事件绑定问题，可能半天到一天可以修好；
        如果涉及后端接口、数据库查询或搜索逻辑，则可能需要 2—3 天。
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 类似项目或参考资料
      description: 可以填写相关链接、截图说明、已有功能参考等。如果没有，可以写“暂无”。
      placeholder: |
        例如：

        可以参考当前 OJ 系统中其他正常工作的搜索功能，
        例如题单搜索、用户搜索或后台管理搜索。

        也可以参考常见 Web 搜索框的实现方式：
        输入关键词后重新发送请求，并根据最新返回结果更新页面。
    validations:
      required: false

  - type: textarea
    id: discussion
    attributes:
      label: 希望大家讨论的问题
      description: 你希望其他成员重点帮你判断或补充哪些问题？
      placeholder: |
        例如：

        1. 这个问题是所有浏览器都会出现，还是只在部分浏览器中出现？
        2. 搜索失效时，控制台是否有报错？
        3. 第二次搜索时，Network 里是否真的发出了新的请求？
        4. 搜索结果不刷新，是前端没有重新渲染，还是后端返回了错误数据？
        5. 是否需要顺便优化搜索框的交互体验？
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: 提交前确认
      options:
        - label: 我已经检查过目前没有同学提出类似的项目
          required: true
        - label: 我确认这个想法不涉及作弊、外挂、恶意爬取、账号盗用或其他违规内容。
          required: true
        - label: 我理解这个想法不一定会被直接立项，最终会结合投票、讨论和可实现性综合判断。
          required: true
